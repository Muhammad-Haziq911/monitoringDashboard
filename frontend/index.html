<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Lab Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow bg-glow-secondary"></div>
    
    <header class="app-header">
        <div class="logo">
            <i class="fa-solid fa-server logo-icon"></i>
            <h1>HomeLab<span>Dashboard</span></h1>
        </div>
        <nav class="app-nav">
            <a href="index.html" class="nav-link active"><i class="fa-solid fa-desktop"></i> Devices</a>
            <a href="services.html" class="nav-link"><i class="fa-solid fa-circle-nodes"></i> Services</a>
        </nav>
        <div class="sys-summary">
            <div class="summary-item">
                <span class="label">Total Nodes</span>
                <span class="value" id="total-nodes">0</span>
            </div>
            <div class="summary-item">
                <span class="label">Active Nodes</span>
                <span class="value text-success" id="active-nodes">0</span>
            </div>
            <div class="summary-item" id="total-power-container">
                <span class="label">Lab Power</span>
                <span class="value" id="total-power" style="color: #fbbf24; text-shadow: 0 0 8px rgba(251, 191, 36, 0.2);">0W</span>
            </div>
            <div class="summary-item" id="total-cost-container" title="Based on 29 cents per kWh Synergy rate">
                <span class="label">Est. Cost</span>
                <span class="value" id="total-cost" style="color: #10b981; text-shadow: 0 0 8px rgba(16, 185, 129, 0.2);">$0.00/mo</span>
            </div>
        </div>
    </header>

    <div class="power-trend-section">
        <div class="power-trend-card">
            <div class="power-trend-header">
                <div class="trend-title-group">
                    <h3><i class="fa-solid fa-chart-line"></i> Lab Power Trend</h3>
                    <span class="power-trend-subtitle" id="power-trend-subtitle">Last 6 Hours</span>
                </div>
                <div class="range-selector">
                    <button class="range-btn active" data-range="6h">6H</button>
                    <button class="range-btn" data-range="24h">24H</button>
                    <button class="range-btn" data-range="7d">7D</button>
                    <button class="range-btn" data-range="30d">30D</button>
                </div>
            </div>
            <div class="power-trend-body">
                <canvas id="power-trend-canvas"></canvas>
            </div>
        </div>
    </div>

    <main class="dashboard-grid" id="dashboard-grid">
        <!-- Devices will be dynamically rendered here -->
        <div class="no-devices" id="no-devices">
            <i class="fa-solid fa-satellite-dish pulse-icon"></i>
            <p>Waiting for clients to push metrics...</p>
            <p class="subtext">Make sure the agent script is running on your monitored machines.</p>
        </div>
    </main>

    <footer class="app-footer">
        <p>HomeLab Dashboard &bull; Real-time updates active</p>
    </footer>

    <!-- Live Alerts Toasts -->
    <div class="toast-container" id="toast-container"></div>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
