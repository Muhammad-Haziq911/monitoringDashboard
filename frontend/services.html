<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Lab Services Status</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow bg-glow-secondary"></div>
    
    <header class="app-header">
        <div class="logo">
            <i class="fa-solid fa-server logo-icon"></i>
            <h1>HomeLab<span>Dashboard</span></h1>
        </div>
        <nav class="app-nav">
            <a href="index.html" class="nav-link"><i class="fa-solid fa-desktop"></i> Devices</a>
            <a href="services.html" class="nav-link active"><i class="fa-solid fa-circle-nodes"></i> Services</a>
        </nav>
        <div class="sys-summary">
            <div class="summary-item">
                <span class="label">Total Nodes</span>
                <span class="value" id="total-nodes">0</span>
            </div>
            <div class="summary-item">
                <span class="label">Active Nodes</span>
                <span class="value text-success" id="active-nodes">0</span>
            </div>
            <div class="summary-item" id="total-power-container">
                <span class="label">Lab Power</span>
                <span class="value" id="total-power" style="color: #fbbf24; text-shadow: 0 0 8px rgba(251, 191, 36, 0.2);">0W</span>
            </div>
            <div class="summary-item" id="total-cost-container" title="Based on 29 cents per kWh Synergy rate">
                <span class="label">Est. Cost</span>
                <span class="value" id="total-cost" style="color: #10b981; text-shadow: 0 0 8px rgba(16, 185, 129, 0.2);">$0.00/mo</span>
            </div>
        </div>
    </header>

    <main class="services-grid" id="services-grid">
        <!-- Services will be dynamically rendered here -->
        <div class="no-devices" id="no-services">
            <i class="fa-solid fa-satellite-dish pulse-icon"></i>
            <p>Pinging services...</p>
            <p class="subtext">The APU box is loading and querying your configured local services.</p>
        </div>
    </main>

    <footer class="app-footer">
        <p>HomeLab Dashboard &bull; Real-time updates active</p>
    </footer>

    <!-- App Logic for services -->
    <script src="services.js"></script>
</body>
</html>
